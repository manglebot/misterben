<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>BEM Notation & OOCSS: Writing scaleable CSS</title>
  </head>

  <body>
    <h1 class="header">BEM Wars</h1>
    <div class="container">
      <div class="card card__dark">
        <h2 class="card__header">The Dark Side</h2>
        <img class="card__img" src="./images/vader.jpeg" />
        <p class="card__p">Nesting!</p>
        <p class="card__p">Conflict!</p>
        <p class="card__p">Specificity Wars!</p>
        <button class="button button__dark">Join the Dark Side!!!</button>
      </div>

      <div class="card card__light">
        <h2 class="card__header">The Force</h2>
        <img class="card__img" src="./images/yoda.jpeg" />
        <p class="card__p">Love &amp; Beauty</p>
        <p class="card__p">CSS that Scales!</p>
        <p class="card__p">Great warrior. Wars not make one great!</p>
        <button class="button button__light">Join the Light Side!!!</button>

      </div>
    </div>

  </body>
</html>
